<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; box-sizing: border-box; background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); border: 1px solid #ccc; }
        button { background: #3390ec; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <h3>🛠 Ремонт в Aethe</h3>
    
    <div class="form-group">
        <label>Бренд</label>
        <select id="brand">
            <option value="iPhone">iPhone</option>
            <option value="Samsung">Samsung</option>
            <option value="Другое">Другое</option>
        </select>
    </div>

    <div class="form-group">
        <label>Модель</label>
        <input type="text" id="device" placeholder="Напр: 13 Pro 128gb">
    </div>

    <div class="form-group">
        <label>Телефон</label>
        <input type="tel" id="phone" placeholder="+48 ___ ___ ___">
    </div>

    <div class="form-group">
        <label>Что сломалось?</label>
        <input type="text" id="problem" placeholder="Напр: замена стекла">
    </div>

    <button onclick="sendData()">Отправить заявку</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function sendData() {
            let data = {
                brand: document.getElementById('brand').value,
                device: document.getElementById('device').value,
                phone: document.getElementById('phone').value,
                problem: document.getElementById('problem').value
            };
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
