<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>aethestore Premium</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent-color: #FF8C00; 
            --bg-color: #000000;
            --main-text: #ffffff;
            --hint-text: rgba(255, 255, 255, 0.5);
            --line-color: rgba(255, 255, 255, 0.15);
            --transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- АНИМИРОВАННЫЙ ФОН --- */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            background: var(--accent-color);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        .blob-1 { width: 300px; height: 300px; top: -100px; right: -50px; animation-duration: 25s; }
        .blob-2 { width: 250px; height: 250px; bottom: -50px; left: -100px; animation-duration: 30s; opacity: 0.6; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.2); }
        }

        /* --- SKELETON LOAD --- */
        .skeleton {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .skeleton::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
            animation: skeleton-load 1.5s infinite;
        }
        @keyframes skeleton-load {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px 25px 50px 25px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            z-index: 1;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        /* --- ЯЗЫК --- */
        .language-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            gap: 8px;
        }

        .lang-button {
            background: var(--card-bg);
            border: 1px solid var(--line-color);
            color: var(--main-text);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .lang-button.active {
            background: var(--accent-color);
            color: #000000;
            border-color: var(--accent-color);
        }

        /* --- ЗАГОЛОВОК --- */
        .header-section { margin-bottom: 40px; }
        .header-section h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            font-weight: 800;
            margin: 0;
            color: var(--accent-color);
            letter-spacing: -1px;
            min-height: 54px;
            display: flex;
            align-items: center;
        }
        .cursor {
            display: inline-block;
            width: 3px;
            height: 30px;
            background-color: var(--accent-color);
            margin-left: 5px;
            animation: blink 0.7s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .header-section p { font-size: 13px; margin: 5px 0 0 0; color: var(--hint-text); text-transform: uppercase; letter-spacing: 2px; }

        /* --- ПОЛЯ --- */
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 11px; font-weight: 800; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
        input, select { width: 100%; background: transparent; border: none; border-bottom: 1.5px solid var(--line-color); padding: 12px 0; color: #ffffff; font-size: 17px; outline: none; }
        input:focus { border-bottom-color: var(--accent-color); }
        .location-row { display: flex; gap: 10px; align-items: center; }
        .geo-btn { background: rgba(255, 255, 255, 0.07); border: 1px solid var(--line-color); color: white; padding: 10px; border-radius: 12px; font-size: 18px; }

        .submit-btn {
            margin-top: 20px;
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            border-radius: 18px;
            padding: 20px;
            font-size: 17px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 140, 0, 0.3);
        }

        /* --- ЭКРАН УСПЕХА --- */
        #success-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.8s ease;
        }
        #lottie-check { width: 180px; height: 180px; }
        #success-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 15px;
            font-weight: 800;
            color: var(--accent-color);
            margin-top: 10px;
            text-align: center;
            line-height: 1.4;
        }

        .fade-text { transition: opacity 0.3s ease; }
        .hidden { opacity: 0; }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="skeleton-screen" class="container">
        <div class="skeleton" style="height: 30px; width: 100px; align-self: flex-end; margin-bottom: 20px;"></div>
        <div class="skeleton" style="height: 60px; width: 80%; margin-bottom: 40px;"></div>
        <div class="skeleton" style="height: 50px; margin-bottom: 25px;"></div>
        <div class="skeleton" style="height: 50px; margin-bottom: 25px;"></div>
        <div class="skeleton" style="height: 50px; margin-bottom: 25px;"></div>
        <div class="skeleton" style="height: 60px; border-radius: 18px;"></div>
    </div>

    <div class="container" id="main-app" style="opacity: 0; display: none; transform: translateY(10px);">
        <div class="language-container">
            <button id="lang-en" class="lang-button" onclick="setLanguage('en')">EN</button>
            <button id="lang-pl" class="lang-button" onclick="setLanguage('pl')">PL</button>
            <button id="lang-ru" class="lang-button" onclick="setLanguage('ru')">RU</button>
        </div>

        <div class="header-section">
            <h1><span id="text-node"></span><span class="cursor"></span></h1>
            <p id="app-subtitle" class="fade-text">Premium Service</p>
        </div>

        <div class="input-group">
            <label id="lbl-brand" class="fade-text">Device Brand</label>
            <select id="inp-brand">
                <option value="iPhone">iPhone</option>
                <option value="Samsung">Samsung</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="input-group">
            <label id="lbl-model" class="fade-text">Model & Memory</label>
            <input type="text" id="inp-model" placeholder="e.g. 16 Pro, 256GB">
        </div>

        <div class="input-group">
            <label id="lbl-phone" class="fade-text">Phone Number</label>
            <input type="tel" id="inp-phone" placeholder="+48 ___ ___ ___">
        </div>

        <div class="input-group">
            <label id="lbl-geo" class="fade-text">Location</label>
            <div class="location-row">
                <input type="text" id="inp-location" placeholder="Address or tap pin">
                <button class="geo-btn" onclick="getLocation()">📍</button>
            </div>
        </div>

        <div class="input-group">
            <label id="lbl-issue" class="fade-text">Problem Description</label>
            <input type="text" id="inp-issue" placeholder="What to fix?">
        </div>

        <button class="submit-btn fade-text" id="btn-submit" onclick="sendDataToBot()">Confirm Booking</button>
    </div>

    <div id="success-screen">
        <div id="lottie-check"></div>
        <div id="success-text">ZAMÓWIENIE POTWIERDZONE<br>SKONTAKTUJEMY SIĘ WKRÓTCE</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        const translations = {
            en: { subtitle: "Premium Service", brand: "Device Brand", model: "Model & Memory", model_ph: "e.g. 16 Pro, 256GB", phone: "Phone Number", geo: "Location", geo_ph: "Address or tap pin", issue: "Problem Description", issue_ph: "What to fix?", submit: "Confirm Booking", success: "BOOKING CONFIRMED<br>WE WILL CONTACT YOU SOON" },
            pl: { subtitle: "Serwis Premium", brand: "Marka urządzenia", model: "Model i Pamięć", model_ph: "np. 16 Pro, 256GB", phone: "Numer telefonu", geo: "Lokalizacja", geo_ph: "Wpisz adres lub pinezkę", issue: "Opis problemu", issue_ph: "Co naprawić?", submit: "Złóż zamówienie", success: "ZAMÓWIENIE POTWIERDZONE<br>SKONTAKTUJEMY SIĘ WKRÓTCE" },
            ru: { subtitle: "Премиальный сервис", brand: "Бренд устройства", model: "Модель и Память", model_ph: "напр. 16 Pro, 256ГБ", phone: "Номер телефона", geo: "Локация", geo_ph: "Адрес или пин", issue: "Описание проблемы", issue_ph: "Что починить?", submit: "Подтвердить запись", success: "ЗАПИСЬ ПОДТВЕРЖДЕНА<br>МЫ СКОРО С ВАМИ СВЯЖЕМСЯ" }
        };

        function runTypewriter() {
            const words = ["aethestore", "service"];
            const container = document.getElementById('text-node');
            let wordIndex = 0, charIndex = 0, isDeleting = false, typeSpeed = 150;

            function type() {
                const currentWord = words[wordIndex];
                if (isDeleting) {
                    container.innerHTML = currentWord.substring(0, charIndex - 1);
                    charIndex--;
                    typeSpeed = 50;
                } else {
                    container.innerHTML = currentWord.substring(0, charIndex + 1);
                    charIndex++;
                    typeSpeed = 150;
                }
                if (!isDeleting && charIndex === currentWord.length) {
                    isDeleting = true;
                    typeSpeed = 2500;
                } else if (isDeleting && charIndex === 0) {
                    isDeleting = false;
                    wordIndex = (wordIndex + 1) % words.length;
                    typeSpeed = 500;
                }
                setTimeout(type, typeSpeed);
            }
            type();
        }

        function setLanguage(lang) {
            localStorage.setItem('aethe_lang', lang);
            document.querySelectorAll('.lang-button').forEach(b => b.classList.remove('active'));
            document.getElementById('lang-' + lang).classList.add('active');
            const targets = document.querySelectorAll('.fade-text');
            targets.forEach(t => t.classList.add('hidden'));
            setTimeout(() => {
                const t = translations[lang];
                document.getElementById('app-subtitle').innerText = t.subtitle;
                document.getElementById('lbl-brand').innerText = t.brand;
                document.getElementById('lbl-model').innerText = t.model;
                document.getElementById('inp-model').placeholder = t.model_ph;
                document.getElementById('lbl-phone').innerText = t.phone;
                document.getElementById('lbl-geo').innerText = t.geo;
                document.getElementById('inp-location').placeholder = t.geo_ph;
                document.getElementById('lbl-issue').innerText = t.issue;
                document.getElementById('inp-issue').placeholder = t.issue_ph;
                document.getElementById('btn-submit').innerText = t.submit;
                document.getElementById('success-text').innerHTML = t.success;
                targets.forEach(t => t.classList.remove('hidden'));
            }, 300);
        }

        function getLocation() {
            if (navigator.geolocation) {
                tg.HapticFeedback.impactOccurred('medium');
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('inp-location').value = `📍 ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                });
            }
        }

        function showSuccess() {
            const app = document.getElementById('main-app');
            const screen = document.getElementById('success-screen');
            app.style.opacity = '0';
            app.style.transform = 'translateY(-10px)';
            
            setTimeout(() => {
                app.style.display = 'none';
                screen.style.display = 'flex';
                setTimeout(() => screen.style.opacity = '1', 50);

                lottie.loadAnimation({
                    container: document.getElementById('lottie-check'),
                    renderer: 'svg',
                    loop: false,
                    autoplay: true,
                    path: 'https://lottie.host/9c24095b-3b49-4786-8a7e-128c743e4987/j6IuE9G4W9.json'
                });

                tg.HapticFeedback.notificationOccurred('success');
                setTimeout(() => tg.close(), 4000);
            }, 800);
        }

        function sendDataToBot() {
            const data = { 
                brand: document.getElementById('inp-brand').value, 
                device: document.getElementById('inp-model').value, 
                phone: document.getElementById('inp-phone').value, 
                location: document.getElementById('inp-location').value, 
                problem: document.getElementById('inp-issue').value 
            };
            if (!data.device || !data.phone) {
                tg.HapticFeedback.notificationOccurred('error');
                return;
            }
            tg.HapticFeedback.impactOccurred('heavy');
            tg.sendData(JSON.stringify(data));
            showSuccess();
        }

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('skeleton-screen').style.display = 'none';
                const app = document.getElementById('main-app');
                app.style.display = 'flex';
                setTimeout(() => {
                    app.style.opacity = '1';
                    app.style.transform = 'translateY(0)';
                }, 50);
                runTypewriter();
                setLanguage(localStorage.getItem('aethe_lang') || 'en');
            }, 1200);
        });
    </script>
</body>
</html>
