<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aethe Premium Service</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* --- ПЕРЕМЕННЫЕ ЦВЕТОВ --- */
        :root {
            --accent-color: #FF8C00; /* Titanium Orange */
            --bg-color: #000000;
            --main-text: #ffffff;
            --hint-text: rgba(255, 255, 255, 0.5);
            --line-color: rgba(255, 255, 255, 0.15);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- ОБЩИЕ СТИЛИ ТЕЛА --- */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--main-text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* --- АНИМАЦИЯ ПОЯВЛЕНИЯ --- */
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px 25px 50px 25px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            animation: slideUp 0.8s ease forwards;
        }

        /* --- ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА --- */
        .language-container {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 30px;
            gap: 10px;
        }

        .lang-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--line-color);
            color: var(--main-text);
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
        }

        .lang-button.active {
            background: var(--accent-color);
            color: #000000;
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        /* --- ЗАГОЛОВОК --- */
        .header-section {
            margin-bottom: 40px;
        }

        .header-section h1 {
            font-size: 40px;
            font-weight: 900;
            margin: 0;
            color: var(--accent-color);
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }

        .header-section p {
            font-size: 13px;
            margin: 8px 0 0 0;
            color: var(--hint-text);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- ГРУППЫ ПОЛЕЙ ВВОДА --- */
        .input-group {
            margin-bottom: 30px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid var(--line-color);
            border-radius: 0;
            padding: 12px 0;
            color: #ffffff;
            font-size: 18px;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-bottom-color: var(--accent-color);
            padding-left: 5px;
        }

        /* Специфично для локации */
        .location-flex {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .location-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--line-color);
            color: white;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
        }

        .location-btn:active {
            border-color: var(--accent-color);
            background: rgba(255, 140, 0, 0.15);
        }

        /* --- КНОПКА ОТПРАВКИ --- */
        .main-button {
            margin-top: auto;
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            border-radius: 20px;
            padding: 22px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .main-button:active {
            transform: scale(0.96);
        }

        /* --- ЭФФЕКТЫ ПЕРЕКЛЮЧЕНИЯ ТЕКСТА --- */
        .fade-target {
            transition: opacity 0.3s ease;
        }

        .fade-hidden {
            opacity: 0;
        }

    </style>
</head>
<body>

    <div class="container">
        
        <div class="language-container">
            <button id="lang-ru" class="lang-button" onclick="changeAppLanguage('ru', this)">RU</button>
            <button id="lang-en" class="lang-button" onclick="changeAppLanguage('en', this)">EN</button>
            <button id="lang-pl" class="lang-button" onclick="changeAppLanguage('pl', this)">PL</button>
        </div>

        <div class="header-section">
            <h1 id="app-title">Aethe</h1>
            <p id="app-subtitle" class="fade-target">Premium Service</p>
        </div>

        <div class="input-group">
            <label id="lbl-brand" class="fade-target">Бренд</label>
            <select id="inp-brand">
                <option value="iPhone">iPhone</option>
                <option value="Samsung">Samsung</option>
                <option value="Xiaomi">Xiaomi</option>
                <option value="Other">Другое</option>
            </select>
        </div>

        <div class="input-group">
            <label id="lbl-model" class="fade-target">Модель</label>
            <input type="text" id="inp-model" placeholder="...">
        </div>

        <div class="input-group">
            <label id="lbl-phone" class="fade-target">Телефон</label>
            <input type="tel" id="inp-phone" placeholder="+48 ___ ___ ___">
        </div>

        <div class="input-group">
            <label id="lbl-geo" class="fade-target">Локация</label>
            <div class="location-flex">
                <input type="text" id="inp-location" placeholder="...">
                <button class="location-btn" onclick="getUserLocation()">📍</button>
            </div>
        </div>

        <div class="input-group">
            <label id="lbl-problem" class="fade-target">Проблема</label>
            <input type="text" id="inp-problem" placeholder="...">
        </div>

        <button class="main-button fade-target" id="btn-submit" onclick="sendApplication()">
            Подтвердить запись
        </button>

    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#000000');

        // Словарь всех текстов
        const dict = {
            ru: {
                subtitle: "Премиальный сервис",
                brand: "Бренд устройства",
                model: "Модель / Память",
                model_ph: "Напр: 17 Pro, 1TB",
                phone: "Контактный номер",
                geo: "Адрес / Геолокация",
                issue: "Описание поломки",
                issue_ph: "Что нужно починить?",
                submit: "Подтвердить запись"
            },
            en: {
                subtitle: "Premium Device Service",
                brand: "Device Brand",
                model: "Model & Memory",
                model_ph: "e.g. 17 Pro, 1TB",
                phone: "Phone Number",
                geo: "Address / Location",
                issue: "Issue Description",
                issue_ph: "What is broken?",
                submit: "Confirm Booking"
            },
            pl: {
                subtitle: "Serwis Premium",
                brand: "Marka urządzenia",
                model: "Model i Pamięć",
                model_ph: "np. 17 Pro, 1TB",
                phone: "Numer telefonu",
                geo: "Adres / Lokalizacja",
                issue: "Opis usterki",
                issue_ph: "Co należy naprawić?",
                submit: "Złóż zamówienie"
            }
        };

        // Функция смены языка с анимацией
        function changeAppLanguage(lang, btn) {
            localStorage.setItem('selected_lang', lang);
            
            const targets = document.querySelectorAll('.fade-target');
            targets.forEach(t => t.classList.add('fade-hidden'));

            setTimeout(() => {
                // Кнопки
                document.querySelectorAll('.lang-button').forEach(b => b.classList.remove('active'));
                if(btn) btn.classList.add('active');
                else document.getElementById('lang-' + lang).classList.add('active');

                // Тексты
                const data = dict[lang];
                document.getElementById('app-subtitle').innerText = data.subtitle;
                document.getElementById('lbl-brand').innerText = data.brand;
                document.getElementById('lbl-model').innerText = data.model;
                document.getElementById('inp-model').placeholder = data.model_ph;
                document.getElementById('lbl-phone').innerText = data.phone;
                document.getElementById('lbl-geo').innerText = data.geo;
                document.getElementById('lbl-problem').innerText = data.issue;
                document.getElementById('inp-problem').placeholder = data.issue_ph;
                document.getElementById('btn-submit').innerText = data.submit;

                targets.forEach(t => t.classList.remove('fade-hidden'));
            }, 300);
        }

        // Геолокация
        function getUserLocation() {
            if (navigator.geolocation) {
                tg.HapticFeedback.impactOccurred('light');
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('inp-location').value = `📍 ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
                }, (err) => {
                    tg.showAlert("Доступ к геопозиции закрыт");
                });
            }
        }

        // Отправка данных боту
        function sendApplication() {
            const result = {
                brand: document.getElementById('inp-brand').value,
                device: document.getElementById('inp-model').value,
                phone: document.getElementById('inp-phone').value,
                location: document.getElementById('inp-location').value,
                problem: document.getElementById('inp-problem').value
            };
            
            if (!result.device || !result.phone) {
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Пожалуйста, заполните данные!");
                return;
            }

            tg.HapticFeedback.impactOccurred('heavy');
            tg.sendData(JSON.stringify(result));
        }

        // Старт приложения
        window.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('selected_lang');
            const userLang = tg.initDataUnsafe.user?.language_code;
            
            if (saved && dict[saved]) {
                changeAppLanguage(saved);
            } else if (userLang && dict[userLang]) {
                changeAppLanguage(userLang);
            } else {
                changeAppLanguage('ru');
            }
        });

    </script>
</body>
</html>
